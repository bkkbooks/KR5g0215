front:
  text: 太上洞玄靈寶芝草品亦一竊以延命之術本因餌藥長生鴻寶宛祕之書論云仙人使鬼是以廣成子居崆峒山上示道治而授軒轅赤松子升昆崙宫服水玉而教炎帝仍隨風雨上下究察機祥遊歷名山顧觀草木闡驗幽昧芝英一作精形品萬端實難辨别故畫圖記著狀貼傳請據尋求得臻仙路耶青玉芝青玉芝生於揚州山其味甘酸服之十二萬歲王子喬食仙矣蒼虎守之依圖取服有四重第二重有二枝蓋莖並皆青也
  hash: sha256:e22485e51fabd5f61a63af20bcbe2bfeb8cf72921ae80a0cdbee798eb80e20aa
