body:
  text: 赤玉芝赤玉芝一作子食芝生於郁州山狀如此其味苦赤松子食之得仙赤虎赤魚守之依圖取服莖蓋赤有二重下重有二小芝上重二小芝並有蓋黃玉芝黃玉芝生於蓬萊山其色黃味辛東王父食之壽九萬歲仙矣黃虎黃魚守之三重下重有三枝一有生九蓋蓋莖並黃也白玉芝白玉芝生於方丈山中其味辛白蓋四重下一重上有二枚生並有三枚生上重或生大石之上黃沙之中腐木之根高樹之下名山之陰得而食之仙矣白虎守之黑玉芝黑玉芝生於龜山之中其味甘酸鮮于子食之得仙矣傍有黑虎守之其狀如此上有二小枝重生其色黑有四重莖蓋並赤五帝玉芝五帝玉芝生於嵩高名山中有五色及五變五行四時有味以四時取服之為萬年仙矣有三重下二重二枝相對青帝玉芝青帝玉芝生於名山之中大樹之下黃雲覆之青蓋赤裏其莖白其味酸春甲乙日取食之令人不老仙矣赤赤帝玉芝赤帝玉芝生於名山之陽赤蓋黃裏白莖上有赤雲其味甘苦夏採食之令人得四千年仙矣黃帝玉芝黃帝玉芝生於名山之上上有五色雲黃蓋白莖其味甘苦食之令人不驚恐長生三萬年得仙矣白帝玉芝白帝玉芝生於名山之陽重石之間白蓋青莖裏黑其味甘食之令人得三千年仙矣黑帝玉芝黑帝玉芝生於名山之陰大谷之中黑雲覆之黑蓋青裏黃莖其味甘酸冬間採食之今人不老得仙東方芝東方芝生於名山之陽大谷中青赤裏二重白蓋青莖其味酸食之延年十萬歲仙矣南方芝南方芝生於名山之陽赤色赤蓋赤莖有三枝其味苦用竹刀採之陰乾百日食之如錢得三萬歲仙矣中央芝中央芝生於名山之陰白蓋黃莖裏黑枝如一莖蓋二枝要半上屈頭垂如懸蓋傍有黃羊捍守之用木刀採食之仙矣西方芝西方芝生於名山之陰白蓋黑裏青莖有三枝俱生其味甘辛食之萬年仙矣北方芝北方芝生於名山之陰黑蓋莖三枝並生其味甘美食之仙矣入水不溺不老得八萬年有黑牛守之石臼芝石臼芝生於少室山上有赤雲兩邊黃虎守之蓋赤黑莖與石玉芝相對生取之當齊戒沐浴三十日雄雞過轉鳴自稱天齊將軍使者彩衣冠帶玄服往取食之一合六十萬歲一作十六生大石之間其味甘酸下根四方高三尺木神芝木神芝生於嵩高山之陰黃蓋黑裏上有赤雲及朱雀守之以六月戊己辰日採而食之得九千歲令人仙矣狀如四方石有一坦者鬼菌芝鬼菌芝生於名山之陰白蓋狀如甑二鬼守之見人即滅以夜採之陰乾百日食如刀圭所向盡服織女服之仙升天矣人威芝人威芝生於嵩高少室太室之山狀如人赤色戴蓋乍黃乍赤味甘食之令人不老服之十萬年仙矣金精芝金精芝生於華山白蓋莖上有白雲狀如雀雞其味甘辛十月壬日採之陰乾百日食之八千歲韓衆食之仙矣黃芝黃芝生於黃土山黃蓋三重其味甘食之與天地等一莖色白生金芝生金芝生於名山之陽白蓋赤裏赤莖春夏採之陰乾百日食之一合陰病除增年也龜威芝龜威芝生於常山深淵之中其色青黑龜文蓋青白裏莖黑味酸苦採而食之為萬歲仙矣龍威芝龍威芝生於太山之陰青莖紫蓋白裏其文似龍蛇其味甘酸春採食之令人十六萬年仙矣鳥威芝鳥威芝生於南嶽丘山之陰赤蓋黑莖其味酸食之令人身輕不老萬歲矣火精芝火精芝生於霍山之陰赤蓋黃裏黃莖上有赤雲似鳥雞之形其味甘五月丙午日採之九千年仙矣火錫芝火錫芝生於名山之陽大樹之傍色赤如火青莖赤蓋炎起五枝似火其味甘苦夏採而食之延年得仙矣赤松子芝赤松子芝生於𡷗山有千歲松樹者生於其間狀似木人形採之陰乾百日食之與天地等仙矣木精芝木精芝生於名山之中冬即木本如紡車捃拾採揀無時其色白其味甘苦食之令人身輕仙矣無蓋似叉莖赤木神芝木神芝生於齊泰山山名曰東嶽青蓋赤裏赤莖上有青雲如雞之狀以壬日採而貪之千萬歲仙矣天目芝天目芝生於名山之陽其色青莖半有二枝上如曲蓋赤覆大蓋上竹刀採之陰乾百日食之五萬年仙矣有黑雲覆之天心芝天心芝生於名山之陽夾石之上青蓋赤莖其味酸以竹刀採之陰乾百日食如一爪甲成三千年仙矣上有赤雲下有白羊守之白英芝白英芝生於太山之陽青色青莖五莖枝相對甘美食之萬歲仙矣水神芝水神芝生於恆山黑蓋青莖上有黑雲如馬形採食之六千歲仙矣土芝土芝生於名山之陽大澤之中白蓋如瓷味辛苦食之不寒不熱夏採服之仙矣望玉芝望玉芝生於名山之陰岡闕中黃蓋赤莖味甘食之令人二千年仙矣下有三莖並生蓋青莖赤上有二莖黃蓋赤莖木文芝木文芝生於名山之中上青下裏黃味甘酸春採食之七百年不老仙矣銅芝銅芝生於名山之陰源泉深谷之中反如甑色青黃赤味辛苦食一合長生仙矣天絳芝天絳芝生於陵谷黑蓋赤裏赤莖味甘小辛食之令人不寒不熱六千年仙矣茯苓芝茯苓芝以冬至日生兔絲下狀似牛蹄黑色味甘食之令人千里外見物壽萬年仙矣北方芝北方芝生於土山狀如蛇赤色白裏味甘酸食之令人不老二萬年仙矣木菌芝木菌芝生於名山之陰谷中樹木上生木三節色青味甘辛食之萬年仙矣風精芝風精芝生於名山之中青蓋莖三枝並生味甘銅刀採食之萬年仙矣靈精芝靈精芝生於名山之陰赤蓋二重紫莖食之二萬年仙矣上有蒼赭雲守之鳥文芝鳥文芝白蓋黑莖裏有文長六尺厚四寸味甘食之四萬歲矣玉菌芝玉菌芝生於名山之陽仲夏季夏採之陰乾百日食之十萬年仙矣倣夜精芝樣面赤下黃白朱莖赤蓋反上生晝精芝晝精芝秋生於名山之陽赤色二枝並生以木刀採之陰乾百日食之一合令人三萬歲莖蓋並赤夜精芝夜精芝生於名山之陰青蓋青莖味酸蓋反仰向外有露飮之令人三萬歲白玉芝白玉芝生於太山谷中葉青下赤每邊三重赤莖採而食之八萬歲矣朝精芝朝精芝夏生白色無蓋如方石味苦銅刀採之陰乾百日食之萬年仙矣上有二人守之春精芝春精芝青赤色反蓋有角上有二子下垂味苦銅刀採之無間多少食之三萬歲有五色雲覆之土菌芝土菌芝五色乍黃乍青乍赤乍白乍黑上有三枝有子食之延年仙矣木菌黃芝木菌黃芝生於大石中葉廣二寸長一尺青色三葉並生下如方石冬夏生味甘美食之不老仙矣夏精芝夏精芝生於名山之中赤色蓋二子如珠蓋中生味甘竹刀採之陰乾百日食之四萬年仙矣秋精芝秋精芝生於坎陷中旁多有香草黃蓋赤裏三枝並曲生頭垂下青莖食之萬歲白雲芝白雲芝有五色圓如鼓上有六子赤色莖亦赤色味酸食之萬年仙矣左神芝左神芝黑蓋反向天白莖有女人守之飲中露二千年生於名山之中右神芝右神芝生於名山青蓋白莖三枝骨刀採之陰乾百日食如瓜甲許壽萬年下有白鹿守之木祿芝木祿芝青色有支文生於名山中味甘食之萬歲上有五莖青蓋石菌芝石菌芝生於名山夜則有光夏午日採取中央赤者食之萬年仙矣白莖頭中似蓮樣赤圭芝赤圭芝生於名山白蓋裏有紋青莖味辛食之不老二百神明從仙矣鐵精芝鐵精芝秋生紫蓋黃裏五枝味甘銅刀採之食如木耳許壽三千年仙矣上有五色雲覆之柯精芝柯精芝生於名山之陰白蓋白莖木刀採之陰乾百日食之如豆大萬歲仙矣中央黃者可食土菌芝土菌芝生於名山青蓋白莖食之萬年仙矣石芝石芝生於名山白蓋白莖食之令人六萬歲仙矣方寸七以上日三服之石精芝石精芝秋生赤蓋白裏赤莖味酸食之為萬年仙矣上有赤鳥守之河閉芝河閉芝秋生黃色三枝並生飮上露九千年仙矣反蓋向上水菌芝水菌芝青蓋白裏青莖食之日一合去病為萬歲仙矣獸菌芝獸菌芝生於名山松柏樹下白蓋白莖夏至日採之旦取一合食三年變化仙矣海闕芝海闕芝秋生沙石上四重似蓋青色赤莖二枝並生上有露飲之萬年仙矣上有五色雲覆之雲瑤芝雲瑤芝精秋生青莖青葉上有白鳥守之飲上露千年仙矣青菌芝青菌芝青蓋二重白裏白莖味甘酸日食一合千年仙矣雲芝雲芝青蓋黃莖味如蜜食之千年得仙矣上有五色雲覆之崑崙芝崑崙芝秋生黃蓋二重黃莖其味甘上有露飮之三千年仙矣人精芝人精芝生於名山頭青蓋白裏赤莖三枝並生味甘飮上露為萬年仙矣山英芝山英芝生於名嶽深崖陰近濕處赤色如四重浮圖級食之千年仙矣紫芝紫芝似人頭味辛食之令人心通不死身輕耳冬如芝冬如芝秋生太山之陽黃蓋三黃莖别根同蓋味甘辛陰乾百日食之二千年仙矣赤精芝赤精芝夏生黃蓋青莖白裏九二重食之五千年仙矣兩邊五色草紫石芝紫石芝味苦赤蓋黃裏赤莖食之令人不死仙矣紫蓋芝紫蓋芝三莖共本下圓上方二尺紫蓋味甘食之三千年仙矣赤精芝赤精芝赤色炎起味甘鐵刀採之陰乾百日食之二千年仙矣二人守之似火炬樣莖炎俱赤迎山連芝迎山連芝食之日行千里八千歲仙矣三枝中枝頂有蓋共根生紫色下二枝無蓋紫山芝紫山芝赤紫色四重赤蓋食之三千年仙矣紫芝紫芝白蓋黃裏似月白莖食之有光明仙矣木芝木芝食之千年仙矣水芝水芝食之千年仙矣似王字樣也重紫芝重紫芝黃蓋赤莖二枝並生相連食之仙矣六柱紫芝六柱紫芝赤蓋赤莖黃裏食之得仙矣頂有蓋下三重無蓋紫科芝紫科芝赤色白裏似蛇味苦除寒熱邪氣日食一合仙矣秋取之紫芝紫芝味甘白蓋三枝莖上黃下赤食之仙矣骨體滿實腸化為筋上有蓋一重無蓋重紫芝重紫芝狀如此味甘苦食之仙矣白蓋如起黃莖赤根三枝頂上有蓋下一重二枝無蓋紫芝紫芝赤蓋白裏赤莖味甘食之延年仙矣科芝科芝赤表白裏味甘冬服之令人不老而仙似蛇尾紫芝紫芝赤蓋白裏黑莖味甘秋採食之仙矣火芝火芝赤蓋白裏黑莖味苦冬夏採食之仙矣上有五色雲覆之兩枝交叉分生科芝科芝三重赤色蓋白味甘辛食之延年得仙矣水芝水芝赤蓋白裏白莖三枝通上出蓋食之延年仙矣宫芝宫芝食之延年不老仙矣總有十一假也朱蓋赤莖闕芝闕芝夏秋採服方寸七與天地等畢紫蓋紫莖七假當中一枝長兩蓋似珠輪上祿芝上祿芝食之仙矣乘虛行也青蓋朱莖十一假上六中二下三玉精芝玉精芝大海中生味甘服之二千年仙也朱蓋玉莖朱色代侯芝代侯芝上圓下方春一作五月採食之壽萬年也似桶朱色曇芝曇芝食之六年上有紅雲守之朱蓋朱莖朱葉有六葉不死芝不死芝食之萬年上有紅雲紫蓋紫莖四枝無蓋朱芝朱芝食之令人千歲仙矣朱蓋朱莖天威芝天威芝青色四時採食之千萬年有雲赤色覆之青蓋青莖辟精芝辟精芝生海中青色食之千年矣其狀似人形天寒芝天寒芝黃色如人形食之千歲仙矣赤英芝赤英芝味辛四時採食之壽三千年也二枝交叉一枝無蓋一枝頭朱一頭似花未開天芝天芝四時採陰乾百日服方寸七以仙矣朱蓋紫莖天陸芝天陸芝銅刀採食之為三千年仙矣兩莖並生朱色似蓮蘂未開天闕芝天闕芝食之萬年仙矣二莖並生朱蓋白裏地精芝地精芝二羊守之服上露者六千年仙矣三莖並生朱蓋青莖日精芝日精芝味甘竹刀採陰乾百日服方寸七五千年仙矣朱色三枝無蓋共一枝月精芝月精芝竹刀四時採之食如豆五千年仙矣一人守之黃蓋黃莖四時精芝四時精芝服上露二萬年二青龍守之赤色上有五色雲覆之二重朱蓋朱莖黑精芝黑精芝味甘酸骨刀採食之二千年仙矣陰乾百日下有羊守之紫蓋紫莖有兩葉木精芝木精芝味甘食之二千年仙矣陰乾百日上有三馬骨刀採之蓋紫色反向上水精芝水精芝味苦夏採食如爪甲五千年仙矣青蓋四莖穿出蓋上無蓋白莖金精芝金精芝味甘木刀採食之千歲仙矣陰乾百日食之五假似火焰起朱色一朱蓋朱莖一蓋如初生月莖青色水芝水芝生於衆水旁味苦夏採食如爪甲十萬年仙矣蓋紫色頂有三角莖青色通出無蓋雨精芝雨精芝夏生味甘食無拘多少六千年仙矣其蓋青紫莖有四苗生水精芝水精芝生山水旁青黑色四枝並生蓋仰味小苦飲上露十萬年仙矣雲精芝雲精芝生於華山味酸竹刀採之食無多少九千年仙矣蓋紫色莖白虎精芝虎精芝生於華山之陰黃色如虎皮味甘食之令人不老聰明仙矣莖朱色太上洞玄靈寶芝草品
